<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" width="280" height="56" role="img" aria-label="Tint Works">
  <defs>
    <linearGradient id="tw-fade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#00B4FF"/>
      <stop offset="1" stop-color="#0073A8"/>
    </linearGradient>
  </defs>
  <style>
    .mark { fill: #ffffff; }
    .bar { fill: url(#tw-fade); }
    .word { font-family: "Bebas Neue", "Impact", "Oswald", "Anton", system-ui, sans-serif; font-weight: 400; letter-spacing: 0.04em; fill: #ffffff; }
  </style>
  <rect width="280" height="56" fill="transparent"/>
  <!-- Monogram: stacked TW inside a square glyph, with a blue gradient tint stripe -->
  <g transform="translate(4,8)">
    <rect x="0" y="0" width="40" height="40" fill="#141414" stroke="#27272A"/>
    <!-- T crossbar -->
    <rect class="mark" x="6" y="8" width="28" height="4"/>
    <!-- T stem -->
    <rect class="mark" x="18" y="8" width="4" height="24"/>
    <!-- Tint gradient stripe (the "window") -->
    <rect class="bar" x="4" y="34" width="32" height="3"/>
  </g>
  <text class="word" x="54" y="38" font-size="30">TINT WORKS</text>
</svg>
