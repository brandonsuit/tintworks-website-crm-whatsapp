<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" width="240" height="48" role="img" aria-label="Tintworks">
  <style>
    .wordmark { font-family: "Space Grotesk", "Inter", system-ui, sans-serif; font-weight: 700; letter-spacing: -0.02em; fill: #ffffff; }
    .tick { fill: hsl(210, 100%, 56%); }
  </style>
  <rect x="0" y="0" width="240" height="48" fill="transparent" />
